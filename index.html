<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#06171E">
<meta name="color-scheme" content="dark">
<title>byteworkz — a tiny office suite that lives in your browser</title>
<meta name="description" content="byteworkz is a minimal office suite — byteDoc (rich-text editor) plus byteSheet (spreadsheet with formulas, charts, multi-sheet). No accounts, no cloud, no tracking. Pure vanilla JS.">
<meta name="author" content="Stefan Roßkopf (ByteSide.io)">
<meta name="robots" content="index, follow">

<!-- Open Graph + Twitter Card -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://byteworkz.byteside.net/">
<meta property="og:title" content="byteworkz — a tiny office suite that lives in your browser">
<meta property="og:description" content="byteDoc + byteSheet, no accounts, no cloud, no tracking. Everything stays in your browser.">
<meta property="og:site_name" content="byteworkz">
<meta property="og:image" content="https://byteworkz.byteside.net/favicon.svg">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="byteworkz">
<meta name="twitter:description" content="byteDoc + byteSheet, no accounts, no cloud, no tracking.">

<link rel="canonical" href="https://byteworkz.byteside.net/">
<link rel="manifest" href="/site.webmanifest">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/styles.css">
<link rel="stylesheet" href="/doc.css">
<link rel="stylesheet" href="/sheet.css">
</head>
<body>

<header class="topbar" id="topbar">
  <button class="brand" data-route="#/" title="byteworkz Hub">
    <span class="brand-mark">◧</span><span class="brand-text">byteworkz</span>
  </button>
  <div class="topbar-center" id="topbar-center"></div>
  <div class="topbar-right" id="topbar-right">
    <span class="topbar-version" id="topbar-version">v0.1</span>
    <button class="btn-icon" id="topbar-about" title="About byteworkz (keyboard help, links)" aria-label="About">?</button>
  </div>
</header>

<main id="app-root">

  <section class="view view-hub" data-view="hub" hidden>
    <div class="hub-inner">
      <h1 class="hub-title">byteworkz</h1>
      <p class="hub-sub">A tiny office suite. <strong>byteDoc</strong> writes, <strong>byteSheet</strong> calculates. Nothing leaves your browser.</p>

      <div class="hub-tiles">
        <button class="hub-tile" data-route="#/doc">
          <div class="hub-tile-icon" data-app="doc">
            <svg viewBox="0 0 32 32" width="56" height="56" aria-hidden="true">
              <rect x="6" y="3" width="20" height="26" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
              <line x1="10" y1="9" x2="22" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="10" y1="14" x2="22" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="10" y1="19" x2="22" y2="19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="10" y1="24" x2="17" y2="24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="hub-tile-meta">
            <div class="hub-tile-name">byteDoc</div>
            <div class="hub-tile-desc">Rich-text editor</div>
          </div>
        </button>

        <button class="hub-tile" data-route="#/sheet">
          <div class="hub-tile-icon" data-app="sheet">
            <svg viewBox="0 0 32 32" width="56" height="56" aria-hidden="true">
              <rect x="4" y="6" width="24" height="20" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
              <line x1="4" y1="12" x2="28" y2="12" stroke="currentColor" stroke-width="1.5"/>
              <line x1="4" y1="19" x2="28" y2="19" stroke="currentColor" stroke-width="1.5"/>
              <line x1="12" y1="6" x2="12" y2="26" stroke="currentColor" stroke-width="1.5"/>
              <line x1="20" y1="6" x2="20" y2="26" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </div>
          <div class="hub-tile-meta">
            <div class="hub-tile-name">byteSheet</div>
            <div class="hub-tile-desc">Spreadsheet</div>
          </div>
        </button>
      </div>

      <div class="hub-actions">
        <button class="btn-secondary" id="hub-open-file">Open from file…</button>
        <button class="btn-secondary" id="hub-new-doc">+ New byteDoc</button>
        <button class="btn-secondary" id="hub-new-sheet">+ New byteSheet</button>
      </div>

      <section class="hub-recent">
        <h2 class="hub-section-title">Recent</h2>
        <ul class="recent-list" id="recent-list"></ul>
      </section>
    </div>
  </section>

  <section class="view view-doc" data-view="doc" hidden></section>
  <section class="view view-sheet" data-view="sheet" hidden></section>
</main>

<div class="toast-host" id="toast-host" aria-live="polite"></div>
<div class="modal-host" id="modal-host" hidden></div>

<script type="module" src="/app.js"></script>
</body>
</html>
